name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build Notely
        run: ./scripts/buildprod.sh

      - id: 'auth'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Use gcloud CLI
        run: gcloud info

      - name: Push docker image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-496207/notely-ar-repo/wreckitral/notely:latest .

      - name: Run migrations
        run: ./scripts/migrations.sh

      - name: Deploy to Cloud run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-496207/notely-ar-repo/wreckitral/notely:latest --region us-central1 --allow-unauthenticated --project notely-496207 --max-instances=4
